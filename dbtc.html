        <button id="login-btn" onclick="handleLogin()" class="line-btn text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-semibold transition flex items-center gap-1.5">
          <svg class="w-4 h-4 md:w-5 md:h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
          LINE 登入
        </button>
        <div id="user-info" class="hidden flex items-center gap-2">
          <img id="user-avatar" class="w-7 h-7 md:w-8 md:h-8 rounded-full glow-ring" src="" alt="" />
          <span id="user-name" class="text-xs md:text-sm text-emerald-400 font-medium max-w-[80px] md:max-w-none truncate"></span>
          <button id="admin-toggle" onclick="toggleAdminMode()" class="hidden text-slate-600 hover:text-red-400 transition text-xs px-1.5 py-0.5 border border-slate-700 rounded" title="切換管理模式">管理</button>
          <button onclick="handleLogout()" class="text-slate-500 hover:text-red-400 transition text-sm px-1" title="登出">登出</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="relative z-10 max-w-4xl mx-auto px-4 md:px-6 pt-8 md:pt-12 pb-6 md:pb-8 text-center">
    <div class="inline-block mb-4 px-4 py-1.5 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-400 text-sm font-medium">
      Toastmasters · 會務 2025-26
    </div>
    <h1 class="text-2xl md:text-5xl font-extrabold leading-tight mb-4">
      <span class="gradient-text">DBTC 傑仕雙語演講會</span>
    </h1>
    <p class="text-slate-400 text-sm">留言板</p>
    <p class="text-slate-500 text-xs mt-2">用 LINE 登入後留言（不洗版就好）</p>
  </header>

  <!-- Message Form -->
  <section class="relative z-10">
    <div id="msg-form" class="hidden max-w-xl mx-auto px-4 md:px-6 mb-8 fade-in">
      <div class="text-center mb-3">
        <button onclick="toggleForm()" id="form-toggle" class="text-emerald-400 hover:text-emerald-300 transition text-sm font-medium">編輯我的留言 ▼</button>
      </div>
      <div id="form-body" class="hidden bg-white/5 border border-emerald-500/20 rounded-2xl p-6">
        <div class="space-y-4">
          <div>
            <textarea id="f-message" rows="3" placeholder="想說什麼就說什麼（不洗版就好）" class="w-full bg-white/5 border border-white/20 rounded-lg px-3 py-2 text-white text-sm placeholder-slate-600 focus:outline-none focus:border-emerald-500 resize-none"></textarea>
          </div>
          <button onclick="submitMessage()" class="w-full line-btn text-white py-2.5 rounded-lg text-sm font-semibold transition">
            送出留言
          </button>
          <p id="form-msg" class="text-xs text-center hidden"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Member Cards -->
  <section class="relative z-10 max-w-6xl mx-auto px-4 md:px-6 pb-16">
    <div class="text-center mb-6">
      <span id="member-count" class="text-slate-500 text-sm"></span>
    </div>

    <div id="member-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div id="loading" class="text-center py-12 text-slate-500">
      <div class="inline-block w-6 h-6 border-2 border-slate-600 border-t-sky-400 rounded-full animate-spin mb-3"></div>
      <p class="text-sm">載入留言中...</p>
    </div>

    <div id="empty-state" class="hidden text-center py-16">
      <div class="text-5xl mb-4">💬</div>
      <p class="text-slate-400 text-lg font-medium mb-2">還沒有人留言</p>
      <p class="text-slate-500 text-sm">用 LINE 登入，成為第一個留言的人！</p>
    </div>
  </section>

  <!-- Delete Modal -->
  <div id="delete-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm" onclick="closeDeleteModal()">
    <div class="bg-slate-800 border border-white/10 rounded-2xl p-6 max-w-sm mx-4 shadow-2xl" onclick="event.stopPropagation()">
      <h3 class="text-white font-bold text-lg mb-2">確認刪除</h3>
      <p class="text-slate-400 text-sm mb-6">確定要刪除 <span id="delete-name" class="text-white font-medium"></span> 的留言？此操作無法復原。</p>
      <div class="flex gap-3 justify-end">
        <button onclick="closeDeleteModal()" class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-slate-400 text-sm hover:bg-white/10 transition">取消</button>
        <button id="delete-confirm-btn" onclick="confirmDelete()" class="px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg text-white text-sm font-medium transition">刪除</button>
      </div>
    </div>
  </div>

  <!-- Avatar Modal -->
  <div id="avatar-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm" onclick="closeAvatar()">
    <div class="text-center" onclick="event.stopPropagation()">
      <img id="avatar-modal-img" src="" alt="" class="w-64 h-64 rounded-full mx-auto shadow-2xl shadow-sky-500/20 border-4 border-white/10" />
      <p id="avatar-modal-name" class="text-white font-bold text-lg mt-4"></p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="relative z-10 max-w-6xl mx-auto px-6 py-12 text-center border-t border-white/10">
    <div class="mb-4">
      <span class="text-sky-400 font-bold">mark</span><span class="text-white font-bold">luce</span>
      <span class="text-slate-500 text-sm ml-2">馬克路思科技有限公司</span>
    </div>
    <p class="text-slate-600 text-xs mt-4">
      <a href="/ai-innovator.html" class="text-sky-400/60 hover:text-sky-400">AI Innovator</a> &middot;
      <a href="/dbtc.html" class="text-sky-400/60 hover:text-sky-400">DBTC</a> &middot;
      <a href="/blog.html" class="text-sky-400/60 hover:text-sky-400">Blog</a> &middot;
      <a href="/about.html" class="text-sky-400/60 hover:text-sky-400">關於</a>
    </p>
  </footer>

  <script>
    var SUPABASE_URL = 'https://dcjlekszmobaenhrdbfl.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_LoGKEHFftjjIf0G1Xv3ozA_A5nZeudW';
    var LIFF_ID = '2009738746-2qigSpHh';
    var TABLE = 'dbtc_members';
    var ADMIN_LINE_ID = 'U7d41d4b9a49052370bd3a7265c1e391b';

    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var currentUser = null;
    var existingRecord = null;
    var adminMode = false;
    var pendingDeleteId = null;

    function isAdmin() { return currentUser && currentUser.userId === ADMIN_LINE_ID; }

    async function initLiff() {
      if (!LIFF_ID || typeof liff === 'undefined') return;
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          var profile = await liff.getProfile();
          currentUser = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl || '' };
          showLoggedIn();
        }
      } catch (e) {
        console.error('LIFF init error:', e);
      }
    }

    function toggleForm() {
      var body = document.getElementById('form-body');
      var btn = document.getElementById('form-toggle');
      if (body.classList.contains('hidden')) {
        body.classList.remove('hidden');
        btn.textContent = '收起 ▲';
      } else {
        body.classList.add('hidden');
        btn.textContent = '編輯我的留言 ▼';
      }
    }

    function handleLogin() {
      if (!LIFF_ID) return;
      var base = window.location.origin + window.location.pathname;
      if (typeof liff !== 'undefined') {
        liff.login({ redirectUri: base + '?v=' + Date.now() });
      }
    }

    function handleLogout() {
      if (typeof liff !== 'undefined' && liff.isLoggedIn()) liff.logout();
      window.location.reload();
    }

    async function showLoggedIn() {
      document.getElementById('login-btn').style.display = 'none';
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('user-avatar').src = currentUser.pictureUrl;
      document.getElementById('user-name').textContent = currentUser.displayName;

      var result = await sb.from(TABLE).select('*').eq('line_user_id', currentUser.userId).maybeSingle();
      existingRecord = result.data;
      if (existingRecord) {
        document.getElementById('f-message').value = existingRecord.message || '';
      }
      document.getElementById('msg-form').classList.remove('hidden');
      if (isAdmin()) document.getElementById('admin-toggle').classList.remove('hidden');
    }

    async function submitMessage() {
      if (!currentUser) return;
      var msg = document.getElementById('form-msg');
      var record = {
        line_user_id: currentUser.userId,
        display_name: currentUser.displayName,
        avatar_url: currentUser.pictureUrl,
        message: document.getElementById('f-message').value.trim(),
        updated_at: new Date().toISOString(),
      };

      var result;
      if (existingRecord) {
        result = await sb.from(TABLE).update(record).eq('line_user_id', currentUser.userId);
      } else {
        result = await sb.from(TABLE).insert(record);
      }

      if (result.error) {
        msg.textContent = '送出失敗：' + result.error.message;
        msg.className = 'text-xs text-center text-red-400';
      } else {
        msg.textContent = existingRecord ? '已更新留言！' : '留言已送出！';
        msg.className = 'text-xs text-center text-emerald-400';
        existingRecord = record;
        loadMembers();
      }
      msg.classList.remove('hidden');
      setTimeout(function() { msg.classList.add('hidden'); }, 3000);
    }

    function canDelete(lineUserId) {
      if (!currentUser) return false;
      return adminMode && isAdmin();
    }

    function toggleAdminMode() {
      adminMode = !adminMode;
      var btn = document.getElementById('admin-toggle');
      if (adminMode) {
        btn.textContent = '管理中';
        btn.classList.remove('border-slate-700', 'text-slate-600');
        btn.classList.add('border-red-500', 'text-red-400', 'bg-red-500/10');
      } else {
        btn.textContent = '管理';
        btn.classList.add('border-slate-700', 'text-slate-600');
        btn.classList.remove('border-red-500', 'text-red-400', 'bg-red-500/10');
      }
      loadMembers();
    }

    function deleteIntro(lineUserId, name) {
      pendingDeleteId = lineUserId;
      document.getElementById('delete-name').textContent = name;
      var modal = document.getElementById('delete-modal');
      modal.classList.remove('hidden'); modal.classList.add('flex');
    }

    function closeDeleteModal() {
      pendingDeleteId = null;
      var modal = document.getElementById('delete-modal');
      modal.classList.add('hidden'); modal.classList.remove('flex');
    }

    async function confirmDelete() {
      if (!pendingDeleteId) return;
      var btn = document.getElementById('delete-confirm-btn');
      btn.textContent = '刪除中...'; btn.disabled = true;
      var result = await sb.from(TABLE).delete().eq('line_user_id', pendingDeleteId);
      if (result.error) {
        btn.textContent = '失敗';
        setTimeout(function() { btn.textContent = '刪除'; btn.disabled = false; }, 2000);
      } else {
        if (currentUser && currentUser.userId === pendingDeleteId) existingRecord = null;
        closeDeleteModal();
        loadMembers();
      }
    }

    async function loadMembers() {
      var result = await sb.from(TABLE).select('*').order('updated_at', { ascending: false });
      document.getElementById('loading').classList.add('hidden');

      if (result.error || !result.data || result.data.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('member-count').textContent = '';
        return;
      }

      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('member-count').textContent = '已有 ' + result.data.length + ' 則留言';

      var grid = document.getElementById('member-grid');
      grid.innerHTML = result.data.map(function(m, i) {
        var msgHtml = m.message ? escHtml(m.message).replace(/\n/g, '<br/>') : '<span class="text-slate-600 italic">還沒寫留言</span>';
        var timeStr = new Date(m.updated_at || m.created_at).toLocaleString('zh-TW', {timeZone:'Asia/Taipei', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false});
        return '<div class="card-hover fade-in bg-white/5 border border-white/10 rounded-2xl p-5 backdrop-blur-sm" style="animation-delay:' + (i * 60) + 'ms">' +
          '<div class="flex items-center gap-3 mb-3">' +
            (m.avatar_url ? '<img src="' + escHtml(m.avatar_url) + '" alt="" class="w-14 h-14 rounded-full bg-slate-700 cursor-pointer hover:ring-4 hover:ring-sky-500/30 transition flex-shrink-0" onclick="showAvatar(\'' + escHtml(m.avatar_url) + '\', \'' + escHtml(m.display_name) + '\')" onerror="this.style.display=\'none\'" />' : '<div class="w-14 h-14 rounded-full bg-gradient-to-br from-sky-500 to-cyan-500 flex items-center justify-center text-lg font-bold flex-shrink-0">' + escHtml(m.display_name.charAt(0)) + '</div>') +
            '<div>' +
              '<div class="font-bold text-white text-sm">' + escHtml(m.display_name) + '</div>' +
              '<div class="text-slate-500 text-xs">' + timeStr + '</div>' +
            '</div>' +
          '</div>' +
          '<p class="text-slate-300 text-sm leading-relaxed">' + msgHtml + '</p>' +
          (canDelete(m.line_user_id) ? '<div class="mt-3 text-right"><button onclick="deleteIntro(\'' + m.line_user_id + '\', \'' + escHtml(m.display_name) + '\')" class="px-4 py-1.5 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 hover:bg-red-500/20 hover:text-red-300 transition text-sm font-medium">刪除</button></div>' : '') +
        '</div>';
      }).join('');
    }

    function escHtml(str) { var d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

    function showAvatar(url, name) {
      document.getElementById('avatar-modal-img').src = url;
      document.getElementById('avatar-modal-name').textContent = name;
      var modal = document.getElementById('avatar-modal');
      modal.classList.remove('hidden'); modal.classList.add('flex');
    }
    function closeAvatar() {
      var modal = document.getElementById('avatar-modal');
      modal.classList.add('hidden'); modal.classList.remove('flex');
    }

    // Visit tracking
    (function() {
      fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(d) {
        sb.from('visits').insert({ page: location.pathname, ip: d.ip, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      }).catch(function() {
        sb.from('visits').insert({ page: location.pathname, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      });
    })();

    initLiff();
    loadMembers();
  </script>

</body>
