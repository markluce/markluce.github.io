  <title>AI Innovator 進階分會（中部）— 會員牆</title>
  <meta name="description" content="AI Innovator 進階分會（中部）Toastmasters Advanced Club 會員自我介紹牆" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Noto Sans TC"', 'Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .gradient-text { background: linear-gradient(135deg, #34d399, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(52, 211, 153, 0.15); }
    .line-btn { background: #06C755; }
    .line-btn:hover { background: #05b64d; }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .glow-ring { box-shadow: 0 0 0 4px rgba(6, 199, 85, 0.2); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-sky-950 to-slate-900 text-white font-sans">

  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 -left-40 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 right-1/3 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl"></div>
  </div>

  <!-- Nav -->
  <nav class="relative z-10 max-w-6xl mx-auto px-4 md:px-6 py-4 md:py-6 flex items-center justify-between">
    <a href="/" class="text-lg md:text-xl font-bold tracking-tight">
      <span class="text-sky-400">mark</span>luce
    </a>
    <div class="flex items-center gap-2 md:gap-4 flex-wrap justify-end">
      <a href="/" class="text-slate-400 hover:text-white transition text-xs md:text-sm hidden md:inline">AI PM 同學牆</a>
      <a href="/ai-innovator.html" class="text-white text-xs md:text-sm font-medium">AI Innovator</a>
      <a href="/blog.html" class="text-slate-400 hover:text-white transition text-xs md:text-sm">Blog</a>
      <a href="/about.html" class="text-slate-400 hover:text-white transition text-xs md:text-sm hidden md:inline">關於</a>
      <button id="login-btn" onclick="handleLogin()" class="line-btn text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
        LINE 登入
      </button>
      <div id="user-info" class="hidden flex items-center gap-2">
        <img id="user-avatar" class="w-8 h-8 rounded-full glow-ring" src="" alt="" />
        <span id="user-name" class="text-sm text-emerald-400 font-medium"></span>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="relative z-10 max-w-4xl mx-auto px-4 md:px-6 pt-8 md:pt-12 pb-6 md:pb-8 text-center">
    <div class="inline-block mb-4 px-4 py-1.5 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-400 text-sm font-medium">
      Toastmasters Advanced Club
    </div>
    <h1 class="text-2xl md:text-5xl font-extrabold leading-tight mb-4">
      <span class="gradient-text">AI Innovator 進階分會（中部）</span>
    </h1>
    <p class="text-slate-400 text-sm">會員自我介紹牆</p>
    <p class="text-slate-500 text-xs mt-2">用 LINE 登入後即可填寫自我介紹，與會友互相認識！</p>
  </header>

  <!-- Intro Form -->
  <section>
    <div id="intro-form" class="hidden max-w-xl mx-auto px-4 md:px-6 mb-12 fade-in">
      <div class="bg-white/5 border border-emerald-500/20 rounded-2xl p-6">
        <h3 class="text-lg font-bold text-emerald-400 mb-4">填寫你的自我介紹</h3>
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-slate-400 text-xs mb-1 block">原屬分會</label>
              <input id="f-club" type="text" placeholder="例：草屯英語演講會" class="w-full bg-white/5 border border-white/20 rounded-lg px-3 py-2 text-white text-sm placeholder-slate-600 focus:outline-none focus:border-emerald-500" />
            </div>
            <div>
              <label class="text-slate-400 text-xs mb-1 block">專長領域</label>
              <input id="f-expertise" type="text" placeholder="例：AI 協作開發、網頁設計" class="w-full bg-white/5 border border-white/20 rounded-lg px-3 py-2 text-white text-sm placeholder-slate-600 focus:outline-none focus:border-emerald-500" />
            </div>
          </div>
          <div>
            <label class="text-slate-400 text-xs mb-1 block">自我介紹</label>
            <textarea id="f-intro" rows="4" placeholder="你為什麼加入 AI Innovator？對 AI + 演講有什麼期待？" class="w-full bg-white/5 border border-white/20 rounded-lg px-3 py-2 text-white text-sm placeholder-slate-600 focus:outline-none focus:border-emerald-500 resize-none"></textarea>
          </div>
          <button onclick="submitIntro()" class="w-full line-btn text-white py-2.5 rounded-lg text-sm font-semibold transition">
            送出自我介紹
          </button>
          <p id="form-msg" class="text-xs text-center hidden"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Member Cards -->
  <section class="relative z-10 max-w-6xl mx-auto px-4 md:px-6 pb-16">
    <div class="text-center mb-6">
      <span id="member-count" class="text-slate-500 text-sm"></span>
    </div>

    <div id="member-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <div id="loading" class="text-center py-12 text-slate-500">
      <div class="inline-block w-6 h-6 border-2 border-slate-600 border-t-emerald-400 rounded-full animate-spin mb-3"></div>
      <p class="text-sm">載入會員資料中...</p>
    </div>

    <div id="empty-state" class="hidden text-center py-16">
      <div class="text-5xl mb-4">👋</div>
      <p class="text-slate-400 text-lg font-medium mb-2">還沒有人自我介紹</p>
      <p class="text-slate-500 text-sm">成為第一個用 LINE 登入並留下自我介紹的人吧！</p>
    </div>
  </section>

  <!-- Avatar Modal -->
  <div id="avatar-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm" onclick="closeAvatar()">
    <div class="text-center" onclick="event.stopPropagation()">
      <img id="avatar-modal-img" src="" alt="" class="w-64 h-64 rounded-full mx-auto shadow-2xl shadow-emerald-500/20 border-4 border-white/10" />
      <p id="avatar-modal-name" class="text-white font-bold text-lg mt-4"></p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="relative z-10 max-w-6xl mx-auto px-6 py-12 text-center border-t border-white/10">
    <div class="mb-4">
      <span class="text-sky-400 font-bold">mark</span><span class="text-white font-bold">luce</span>
      <span class="text-slate-500 text-sm ml-2">馬克路思科技有限公司</span>
    </div>
    <p class="text-slate-600 text-xs mt-4">
      <a href="/" class="text-sky-400/60 hover:text-sky-400">AI PM 同學牆</a> &middot;
      <a href="/ai-innovator.html" class="text-sky-400/60 hover:text-sky-400">AI Innovator</a> &middot;
      <a href="/blog.html" class="text-sky-400/60 hover:text-sky-400">Blog</a> &middot;
      <a href="/about.html" class="text-sky-400/60 hover:text-sky-400">關於</a>
    </p>
  </footer>

  <script>
    var SUPABASE_URL = 'https://dcjlekszmobaenhrdbfl.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_LoGKEHFftjjIf0G1Xv3ozA_A5nZeudW';
    var LIFF_ID = '2009738746-2qigSpHh';
    var TABLE = 'ai_innovator_members';

    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var currentUser = null;
    var existingRecord = null;

    async function initLiff() {
      if (!LIFF_ID || typeof liff === 'undefined') return;
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          var profile = await liff.getProfile();
          currentUser = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl || '' };
          showLoggedIn();
        }
      } catch (e) {
        console.error('LIFF init error:', e);
      }
    }

    function handleLogin() {
      if (!LIFF_ID) return;
      var base = window.location.origin + window.location.pathname;
      var redirectUri = base + '?v=' + Date.now();
      if (typeof liff !== 'undefined') {
        liff.login({ redirectUri: redirectUri });
      } else {
        window.location.href = 'https://liff.line.me/' + LIFF_ID;
      }
    }

    async function showLoggedIn() {
      document.getElementById('login-btn').style.display = 'none';
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('user-avatar').src = currentUser.pictureUrl;
      document.getElementById('user-name').textContent = currentUser.displayName;

      var result = await sb.from(TABLE).select('*').eq('line_user_id', currentUser.userId).maybeSingle();
      existingRecord = result.data;
      if (existingRecord) {
        document.getElementById('f-club').value = existingRecord.home_club || '';
        document.getElementById('f-expertise').value = existingRecord.expertise || '';
        document.getElementById('f-intro').value = existingRecord.intro_text || '';
      }
      document.getElementById('intro-form').classList.remove('hidden');
    }

    async function submitIntro() {
      if (!currentUser) return;
      var msg = document.getElementById('form-msg');
      var record = {
        line_user_id: currentUser.userId,
        display_name: currentUser.displayName,
        avatar_url: currentUser.pictureUrl,
        home_club: document.getElementById('f-club').value.trim(),
        expertise: document.getElementById('f-expertise').value.trim(),
        intro_text: document.getElementById('f-intro').value.trim(),
        updated_at: new Date().toISOString(),
      };

      var result;
      if (existingRecord) {
        result = await sb.from(TABLE).update(record).eq('line_user_id', currentUser.userId);
      } else {
        result = await sb.from(TABLE).insert(record);
      }

      if (result.error) {
        msg.textContent = '送出失敗：' + result.error.message;
        msg.className = 'text-xs text-center text-red-400';
      } else {
        msg.textContent = existingRecord ? '已更新你的自我介紹！' : '自我介紹已送出！';
        msg.className = 'text-xs text-center text-emerald-400';
        existingRecord = record;
        loadMembers();
      }
      msg.classList.remove('hidden');
      setTimeout(function() { msg.classList.add('hidden'); }, 3000);
    }

    async function loadMembers() {
      var result = await sb.from(TABLE).select('*').order('created_at', { ascending: true });
      document.getElementById('loading').classList.add('hidden');

      if (result.error || !result.data || result.data.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('member-count').textContent = '';
        return;
      }

      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('member-count').textContent = '已有 ' + result.data.length + ' 位會友自我介紹';

      var grid = document.getElementById('member-grid');
      grid.innerHTML = result.data.map(function(m, i) {
        return '<div class="card-hover fade-in bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm" style="animation-delay:' + (i * 80) + 'ms">' +
          '<div class="flex items-center gap-4 mb-4">' +
            (m.avatar_url ? '<img src="' + escHtml(m.avatar_url) + '" alt="" class="w-20 h-20 rounded-full bg-slate-700 cursor-pointer hover:ring-4 hover:ring-emerald-500/30 transition flex-shrink-0" onclick="showAvatar(\'' + escHtml(m.avatar_url) + '\', \'' + escHtml(m.display_name) + '\')" onerror="this.style.display=\'none\'" />' : '<div class="w-20 h-20 rounded-full bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center text-2xl font-bold flex-shrink-0">' + escHtml(m.display_name.charAt(0)) + '</div>') +
            '<div>' +
              '<div class="font-bold text-white">' + escHtml(m.display_name) + '</div>' +
              '<div class="text-slate-500 text-xs">' +
                (m.home_club ? escHtml(m.home_club) : '') + (m.home_club && m.expertise ? ' · ' : '') + (m.expertise ? escHtml(m.expertise) : '') +
              '</div>' +
            '</div>' +
          '</div>' +
          (m.intro_text ? '<p class="text-slate-300 text-sm leading-relaxed">' + escHtml(m.intro_text) + '</p>' : '<p class="text-slate-600 text-sm italic">尚未填寫自我介紹</p>') +
        '</div>';
      }).join('');
    }

    function escHtml(str) { var d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

    function showAvatar(url, name) {
      document.getElementById('avatar-modal-img').src = url;
      document.getElementById('avatar-modal-name').textContent = name;
      var modal = document.getElementById('avatar-modal');
      modal.classList.remove('hidden'); modal.classList.add('flex');
    }
    function closeAvatar() {
      var modal = document.getElementById('avatar-modal');
      modal.classList.add('hidden'); modal.classList.remove('flex');
    }

    // Visit tracking
    (function() {
      fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(d) {
        sb.from('visits').insert({ page: location.pathname, ip: d.ip, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      }).catch(function() {
        sb.from('visits').insert({ page: location.pathname, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      });
    })();

    initLiff();
    loadMembers();
  </script>

</body>
</html>
