    .post-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(14, 165, 233, 0.15); }
    .fade-in { animation: fadeIn 0.5s ease-out; }

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-sky-950 to-slate-900 text-white font-sans">

  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-sky-500/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 -left-40 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 right-1/3 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl"></div>
  </div>

  <!-- Nav -->
  <nav class="relative z-10 max-w-6xl mx-auto px-6 py-6 flex items-center justify-between">
    <a href="/" class="text-xl font-bold tracking-tight">
      <span class="text-sky-400">mark</span>luce
    </a>
    <div class="flex items-center gap-4">
      <a href="/" class="text-slate-400 hover:text-white transition text-sm">同學牆</a>
      <a href="/blog.html" class="text-white text-sm font-medium">Blog</a>
      <a href="/about.html" class="text-slate-400 hover:text-white transition text-sm">關於</a>
      <a href="https://supabase.com/dashboard/project/dcjlekszmobaenhrdbfl/sql/new" target="_blank" rel="noopener noreferrer" class="text-slate-400 hover:text-white transition text-sm flex items-center gap-1">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5zm4 4h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
        DB
      </a>
      <a href="https://github.com/markluce" target="_blank" rel="noopener noreferrer" class="text-slate-400 hover:text-white transition text-sm flex items-center gap-1">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
    </div>
  </nav>

  <!-- Hero -->
  <header class="relative z-10 max-w-4xl mx-auto px-6 pt-12 pb-8 text-center">
    <h1 class="text-4xl md:text-5xl font-extrabold leading-tight mb-4">
      <span class="gradient-text">Blog</span>
    </h1>
    <p class="text-slate-400 text-sm">Mark 陳炳陵的 AI 與創業隨筆</p>
    <p id="post-count" class="text-slate-500 text-xs mt-2"></p>
  </header>

  <!-- Posts -->
  <section class="relative z-10 max-w-3xl mx-auto px-6 pb-16">
    <div id="posts-container"></div>

    <div id="loading" class="text-center py-12 text-slate-500">
      <div class="inline-block w-6 h-6 border-2 border-slate-600 border-t-sky-400 rounded-full animate-spin mb-3"></div>
      <p class="text-sm">載入文章中...</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="relative z-10 max-w-6xl mx-auto px-6 py-12 text-center border-t border-white/10">
    <div class="mb-4">
      <span class="text-sky-400 font-bold">mark</span><span class="text-white font-bold">luce</span>
      <span class="text-slate-500 text-sm ml-2">馬克路思科技有限公司</span>
    </div>
    <p class="text-slate-600 text-xs mt-4">
      <a href="/" class="text-sky-400/60 hover:text-sky-400">同學牆</a> &middot;
      <a href="/blog.html" class="text-sky-400/60 hover:text-sky-400">Blog</a> &middot;
      <a href="/about.html" class="text-sky-400/60 hover:text-sky-400">關於</a> &middot;
      <a href="https://github.com/markluce" class="text-sky-400/60 hover:text-sky-400">GitHub</a>
    </p>
  </footer>

  <script>
    var sb = supabase.createClient('https://dcjlekszmobaenhrdbfl.supabase.co', 'sb_publishable_LoGKEHFftjjIf0G1Xv3ozA_A5nZeudW');

    async function loadPosts() {
      var result = await sb
        .from('blog_posts')
        .select('*')
        .eq('is_public', true)
        .order('posted_date', { ascending: false });

      document.getElementById('loading').classList.add('hidden');

      if (result.error || !result.data || result.data.length === 0) {
        document.getElementById('posts-container').innerHTML = '<p class="text-center text-slate-500 py-12">還沒有文章</p>';
        return;
      }

      var posts = result.data;
      document.getElementById('post-count').textContent = posts.length + ' 篇文章';

      var currentMonth = '';
      var html = '';

      posts.forEach(function(p, i) {
        var d = new Date(p.posted_date + 'T00:00:00');
        var month = d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0');
        var dateStr = d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');

        if (month !== currentMonth) {
          currentMonth = month;
          html += '<div class="text-slate-500 text-xs font-medium uppercase tracking-wider mt-8 mb-4 border-b border-white/10 pb-2">' + month + '</div>';
        }

        var preview = escHtml((p.content || '').substring(0, 150)) + ((p.content || '').length > 150 ? '...' : '');
        var postUrl = '/post.html?slug=' + encodeURIComponent(p.slug || '');
        var hasImages = p.images && p.images.length > 0;
        var hasComments = p.comments && p.comments.length > 0;

        html += '<a href="' + postUrl + '" class="block post-card fade-in bg-white/5 border border-white/10 rounded-2xl p-6 mb-4 backdrop-blur-sm cursor-pointer hover:border-sky-500/30" style="animation-delay:' + (i * 40) + 'ms">' +
          '<div class="flex items-center justify-between mb-3">' +
            '<div class="flex items-center gap-3">' +
              '<div class="w-8 h-8 rounded-full bg-gradient-to-br from-sky-500 to-cyan-500 flex items-center justify-center text-xs font-bold flex-shrink-0">ML</div>' +
              '<div>' +
                '<span class="font-bold text-white text-sm">' + escHtml(p.title || '') + '</span>' +
                '<div class="text-slate-500 text-xs">' + dateStr + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="flex items-center gap-2 text-slate-600 text-xs">' +
              (hasImages ? '<span title="有圖片">🖼</span>' : '') +
              (hasComments ? '<span title="' + p.comments.length + ' 則留言">💬 ' + p.comments.length + '</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="text-slate-400 text-sm leading-relaxed">' + preview + '</div>' +
        '</a>';
      });

      document.getElementById('posts-container').innerHTML = html;
    }

    function escHtml(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // Visit tracking
    (function() {
      fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(d) {
        sb.from('visits').insert({ page: location.pathname, ip: d.ip, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      }).catch(function() {
        sb.from('visits').insert({ page: location.pathname, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      });
    })();

    loadPosts();
  </script>

</body>
</html>
