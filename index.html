  <script>
    const SUPABASE_URL = 'https://dcjlekszmobaenhrdbfl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LoGKEHFftjjIf0G1Xv3ozA_A5nZeudW';
    const LIFF_ID = '2009738746-2qigSpHh';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let existingRecord = null;

    async function initLiff() {
      if (!LIFF_ID) {
        document.getElementById('login-btn').classList.remove('hidden');
        return;
      }
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          currentUser = {
            userId: profile.userId,
            displayName: profile.displayName,
            pictureUrl: profile.pictureUrl || '',
          };
          showLoggedIn();
        } else {
          document.getElementById('login-btn').classList.remove('hidden');
        }
      } catch (e) {
        console.error('LIFF init error:', e);
        document.getElementById('login-btn').classList.remove('hidden');
      }
    }

    function handleLogin() {
      if (!LIFF_ID) return;
      liff.login();
    }

    async function showLoggedIn() {
      document.getElementById('login-btn').classList.add('hidden');
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('user-avatar').src = currentUser.pictureUrl;
      document.getElementById('user-name').textContent = currentUser.displayName;

      const { data } = await sb
        .from('classmates')
        .select('*')
        .eq('line_user_id', currentUser.userId)
        .maybeSingle();

      existingRecord = data;

      if (existingRecord) {
        document.getElementById('f-company').value = existingRecord.company || '';
        document.getElementById('f-title').value = existingRecord.job_title || '';
        document.getElementById('f-group').value = existingRecord.group_number || '';
        document.getElementById('f-intro').value = existingRecord.intro_text || '';
      }

      document.getElementById('intro-form').classList.remove('hidden');
    }

    async function submitIntro() {
      if (!currentUser) return;
      const msg = document.getElementById('form-msg');
      const record = {
        line_user_id: currentUser.userId,
        display_name: currentUser.displayName,
        avatar_url: currentUser.pictureUrl,
        company: document.getElementById('f-company').value.trim(),
        job_title: document.getElementById('f-title').value.trim(),
        group_number: parseInt(document.getElementById('f-group').value) || null,
        intro_text: document.getElementById('f-intro').value.trim(),
        updated_at: new Date().toISOString(),
      };

      let result;
      if (existingRecord) {
        result = await sb
          .from('classmates')
          .update(record)
          .eq('line_user_id', currentUser.userId);
      } else {
        result = await sb
          .from('classmates')
          .insert(record);
      }

      if (result.error) {
        msg.textContent = '送出失敗：' + result.error.message;
        msg.className = 'text-xs text-center text-red-400';
      } else {
        msg.textContent = existingRecord ? '已更新你的自我介紹！' : '自我介紹已送出！';
        msg.className = 'text-xs text-center text-emerald-400';
        existingRecord = record;
        loadClassmates();
      }
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 3000);
    }

    async function loadClassmates() {
      const { data, error } = await sb
        .from('classmates')
        .select('*')
        .order('created_at', { ascending: true });

      document.getElementById('loading').classList.add('hidden');

      if (error || !data || data.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('classmate-count').textContent = '';
        return;
      }

      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('classmate-count').textContent = '已有 ' + data.length + ' 位同學自我介紹';

      const grid = document.getElementById('classmate-grid');
      grid.innerHTML = data.map(function(c, i) {
        return '<div class="card-hover fade-in bg-white/5 border border-white/10 rounded-2xl p-6 backdrop-blur-sm" style="animation-delay:' + (i * 80) + 'ms">' +
          '<div class="flex items-center gap-4 mb-4">' +
            (c.avatar_url ? '<img src="' + escHtml(c.avatar_url) + '" alt="" class="w-20 h-20 rounded-full bg-slate-700 cursor-pointer hover:ring-4 hover:ring-sky-500/30 transition flex-shrink-0" onclick="showAvatar(\'' + escHtml(c.avatar_url) + '\', \'' + escHtml(c.display_name) + '\')" onerror="this.style.display=\'none\'" />' : '<div class="w-20 h-20 rounded-full bg-gradient-to-br from-sky-500 to-cyan-500 flex items-center justify-center text-2xl font-bold flex-shrink-0">' + escHtml(c.display_name.charAt(0)) + '</div>') +
            '<div>' +
              '<div class="font-bold text-white">' + escHtml(c.display_name) + '</div>' +
              '<div class="text-slate-500 text-xs">' +
                (c.company ? escHtml(c.company) : '') + (c.company && c.job_title ? ' · ' : '') + (c.job_title ? escHtml(c.job_title) : '') +
              '</div>' +
              (c.group_number ? '<span class="mt-1 inline-block px-2 py-0.5 bg-sky-500/10 border border-sky-500/20 rounded-full text-sky-400 text-xs">第 ' + c.group_number + ' 組</span>' : '') +
            '</div>' +
          '</div>' +
          (c.intro_text ? '<p class="text-slate-300 text-sm leading-relaxed">' + escHtml(c.intro_text) + '</p>' : '<p class="text-slate-600 text-sm italic">尚未填寫自我介紹</p>') +
        '</div>';
      }).join('');
    }

    function escHtml(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function showAvatar(url, name) {
      document.getElementById('avatar-modal-img').src = url;
      document.getElementById('avatar-modal-name').textContent = name;
      var modal = document.getElementById('avatar-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeAvatar() {
      var modal = document.getElementById('avatar-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Visit tracking
    (function() {
      fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(d) {
        sb.from('visits').insert({
          page: location.pathname,
          ip: d.ip,
          user_agent: navigator.userAgent,
          referrer: document.referrer || null,
          screen_width: screen.width,
          screen_height: screen.height,
          language: navigator.language
        });
      }).catch(function() {
        sb.from('visits').insert({
          page: location.pathname,
          user_agent: navigator.userAgent,
          referrer: document.referrer || null,
          screen_width: screen.width,
          screen_height: screen.height,
          language: navigator.language
        });
      });
    })();

    initLiff();
    loadClassmates();
  </script>
