      { w:7, date:'05/23 (六)', period:'下午', time:'13:30-15:30', title:'PM 實務：產品介面與整合、快速打造 MVP', teacher:'GIGA', org:'Nautilus AI 執行長' },
      { w:7, date:'05/23 (六)', period:'小組', time:'16:00-17:00', title:'小組專題時間：專題討論', teacher:'全體學員', org:'—' },

      // W8 05/30

      { w:8, date:'05/30 (六)', period:'上午', time:'10:35-12:00', title:'AI 素養級認證考試 AIATCL™ (50 分鐘)', teacher:'全體學員', org:'—' },
      { w:8, date:'05/30 (六)', period:'下午', time:'13:30-15:30', title:'小組成果發表 Demo Day', teacher:'全體學員', org:'—' },
      { w:8, date:'05/30 (六)', period:'小組', time:'16:00-17:00', title:'結業式', teacher:'全體學員', org:'AIA' }
    ];

    async function initLiff() {
      if (!LIFF_ID || typeof liff === 'undefined') {
        showLoginRequired();
        return;
      }
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          showLoginRequired();
          return;
        }
        var profile = await liff.getProfile();
        currentUser = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl || '' };
        showSchedule();
      } catch (e) {
        console.error('LIFF init error:', e);
        showLoginRequired();
      }
    }

    function handleLogin() {
      var base = window.location.origin + window.location.pathname;
      liff.login({ redirectUri: base + '?v=' + Date.now() });
    }

    function handleLogout() {
      if (typeof liff !== 'undefined' && liff.isLoggedIn()) liff.logout();
      window.location.reload();
    }

    function showLoginRequired() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('login-required').classList.remove('hidden');
    }

    function showSchedule() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('user-avatar').src = currentUser.pictureUrl;
      document.getElementById('user-name').textContent = currentUser.displayName;
      document.getElementById('schedule-content').classList.remove('hidden');
      populateTeacherFilter();
      render();
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function populateTeacherFilter() {
      var teachers = {};
      ROWS.forEach(function(r) {
        r.teacher.split(/[、&]/).map(function(t) { return t.trim(); }).forEach(function(t) {
          if (t && t !== '全體學員') teachers[t] = true;
        });
      });
      var sel = document.getElementById('f-teacher');
      Object.keys(teachers).sort().forEach(function(t) {
        var opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      });
    }

    function periodClass(p) {
      if (p === '上午') return 'period-morning';
      if (p === '下午') return 'period-afternoon';
      if (p === '小組') return 'period-group';
      return 'period-ops';
    }

    function render() {
      var search = document.getElementById('f-search').value.trim().toLowerCase();
      var week = document.getElementById('f-week').value;
      var period = document.getElementById('f-period').value;
      var teacher = document.getElementById('f-teacher').value;

      var filtered = ROWS.filter(function(r) {
        if (week && String(r.w) !== week) return false;
        if (period && r.period !== period) return false;
        if (teacher && r.teacher.indexOf(teacher) === -1) return false;
        if (search) {
          var hay = (r.title + ' ' + r.teacher + ' ' + r.org + ' ' + r.date + ' W' + r.w).toLowerCase();
          if (hay.indexOf(search) === -1) return false;
        }
        return true;
      });

      var tbody = document.getElementById('tbody');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-slate-500 py-8">沒有符合條件的課程</td></tr>';
      } else {
        tbody.innerHTML = filtered.map(function(r) {
          return '<tr>' +
            '<td class="whitespace-nowrap font-mono text-sky-400">W' + r.w + '</td>' +
            '<td class="whitespace-nowrap text-slate-300">' + esc(r.date) + '</td>' +
            '<td class="whitespace-nowrap"><span class="period-tag ' + periodClass(r.period) + '">' + r.period + '</span></td>' +
            '<td class="whitespace-nowrap font-mono text-[11px] text-slate-400">' + esc(r.time) + '</td>' +
            '<td class="text-white">' + esc(r.title) + '</td>' +
            '<td class="whitespace-nowrap text-emerald-300">' + esc(r.teacher) + '</td>' +
            '<td class="whitespace-nowrap text-slate-400 text-[11px]">' + esc(r.org) + '</td>' +
          '</tr>';
        }).join('');
      }

      document.getElementById('count').textContent = '共 ' + filtered.length + ' / ' + ROWS.length + ' 筆';
    }

    function resetFilters() {
      document.getElementById('f-search').value = '';
      document.getElementById('f-week').value = '';
      document.getElementById('f-period').value = '';
      document.getElementById('f-teacher').value = '';
      render();
    }

    initLiff();
  </script>
</body>
</html>
