        { period:'下午', time:'13:30-15:30', title:'主題演講', teacher:'吳振和', org:'Cacafly 技術副總' },
        { period:'小組', time:'16:00-17:00', title:'小組專題時間：學員分組相見歡', teacher:'全體學員', org:'—' },

        { period:'上午', time:'09:00-10:20', title:'提示工程與 Gemini 多模態實戰：AI 溝通術', teacher:'蔡政霖', org:'AIA' },

      ],

        { period:'上午', time:'09:00-10:20', title:'檢索增強生成 (RAG) 與 NotebookLM 應用', teacher:'蔡政霖', org:'AIA' },
        { period:'上午', time:'10:35-12:00', title:'RAG / NotebookLM 實戰（續）', teacher:'蔡政霖', org:'AIA' },
        { period:'下午', time:'13:30-15:30', title:'PM 實務：範疇 / 時間 / 人力 / 品質控管', teacher:'GIGA', org:'Nautilus AI 執行長' },
        { period:'小組', time:'16:00-17:00', title:'專題演講：你是否在公司救了一個專案？— 深談 AI PM 與工具實踐', teacher:'王淳恆', org:'圖策科技 AI 研發處長' }
      ],
      4: [
        { period:'上午', time:'09:00-10:20', title:'Google Workspace 工具 AI 實戰應用：簡報效率倍增', teacher:'李福裕', org:'AIA' },
        { period:'上午', time:'10:35-12:00', title:'Google Workspace AI 實戰（續）', teacher:'李福裕', org:'AIA' },
        { period:'下午', time:'13:30-15:30', title:'PM 實務：成本管理 / 採購管理', teacher:'GIGA', org:'Nautilus AI 執行長' },
        { period:'小組', time:'16:00-17:00', title:'小組專題時間：專題討論', teacher:'全體學員', org:'—' },

        { period:'上午', time:'10:35-12:00', title:'業務流程自動化：市場趨勢週報', teacher:'李福裕', org:'AIA' },

      ],

        { period:'上午', time:'09:00-10:20', title:'Vibe Coding：實戰部署 — 訂單追蹤儀表板', teacher:'劉又綺', org:'AIA' },
        { period:'上午', time:'10:35-12:00', title:'Vibe Coding：專案看板 Kanban / 驗收 / 驗證', teacher:'劉又綺', org:'AIA' },

      if (c[idx]) ROWS.push(Object.assign({ w:w, date:d }, c[idx++]));
      // 10:20-10:35 break
      ROWS.push({ w:w, date:d, period:'休息', time:'10:20-10:35', title:'☕ 休息', teacher:'—', org:'—' });

      if (c[idx]) ROWS.push(Object.assign({ w:w, date:d }, c[idx++]));
      // 12:00-13:30 lunch
      ROWS.push({ w:w, date:d, period:'休息', time:'12:00-13:30', title:'🍱 午餐', teacher:'—', org:'—' });
      // Afternoon
      if (c[idx]) ROWS.push(Object.assign({ w:w, date:d }, c[idx++]));
      // 15:30-16:00 break
      ROWS.push({ w:w, date:d, period:'休息', time:'15:30-16:00', title:'☕ 休息', teacher:'—', org:'—' });
      // Group
      if (c[idx]) ROWS.push(Object.assign({ w:w, date:d }, c[idx++]));
      // Ops (W1, W4 only)
      if (c[idx]) ROWS.push(Object.assign({ w:w, date:d }, c[idx++]));
      // 17:30- video
      ROWS.push({ w:w, date:d, period:'影片', time:'17:30-', title:'📹 課程影片', teacher:'—', org:'新光板橋傑仕堡 A棟 2樓' });
    }

    async function initLiff() {
      if (!LIFF_ID || typeof liff === 'undefined') {
        showLoginRequired();
        return;
      }
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          showLoginRequired();
          return;
        }
        var profile = await liff.getProfile();
        currentUser = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl || '' };
        showSchedule();
      } catch (e) {
        console.error('LIFF init error:', e);
        showLoginRequired();
      }
    }

    function handleLogin() {
      var base = window.location.origin + window.location.pathname;
      liff.login({ redirectUri: base + '?v=' + Date.now() });
    }

    function handleLogout() {
      if (typeof liff !== 'undefined' && liff.isLoggedIn()) liff.logout();
      window.location.reload();
    }

    function showLoginRequired() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('login-required').classList.remove('hidden');
    }

    function showSchedule() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('user-avatar').src = currentUser.pictureUrl;
      document.getElementById('user-name').textContent = currentUser.displayName;
      document.getElementById('schedule-content').classList.remove('hidden');
      populateTeacherFilter();
      render();
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function populateTeacherFilter() {
      var teachers = {};
      ROWS.forEach(function(r) {
        if (r.teacher === '—') return;
        r.teacher.split(/[、&]/).map(function(t) { return t.trim(); }).forEach(function(t) {
          if (t && t !== '全體學員' && t !== '校務團隊') teachers[t] = true;
        });
      });
      var sel = document.getElementById('f-teacher');
      Object.keys(teachers).sort().forEach(function(t) {
        var opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      });
    }

    function periodClass(p) {
      if (p === '上午') return 'period-morning';
      if (p === '下午') return 'period-afternoon';
      if (p === '小組') return 'period-group';
      if (p === '課務') return 'period-ops';
      if (p === '休息') return 'period-break';
      if (p === '影片') return 'period-video';
      return '';
    }

    function render() {
      var search = document.getElementById('f-search').value.trim().toLowerCase();
      var week = document.getElementById('f-week').value;
      var period = document.getElementById('f-period').value;
      var teacher = document.getElementById('f-teacher').value;
      var showBreaks = document.getElementById('f-breaks').checked;

      var filtered = ROWS.filter(function(r) {
        if (week && String(r.w) !== week) return false;
        if (period && r.period !== period) return false;
        if (!showBreaks && (r.period === '休息' || r.period === '影片')) return false;
        if (teacher && r.teacher.indexOf(teacher) === -1) return false;
        if (search) {
          var hay = (r.title + ' ' + r.teacher + ' ' + r.org + ' ' + r.date + ' W' + r.w).toLowerCase();
          if (hay.indexOf(search) === -1) return false;
        }
        return true;
      });

      var tbody = document.getElementById('tbody');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-slate-500 py-8">沒有符合條件的課程</td></tr>';
      } else {
        tbody.innerHTML = filtered.map(function(r) {
          var dim = (r.period === '休息' || r.period === '影片') ? ' row-dim' : '';
          return '<tr class="' + dim + '">' +
            '<td class="whitespace-nowrap font-mono font-bold" style="color:#0c5a80">W' + r.w + '</td>' +
            '<td class="whitespace-nowrap" style="color:#333">' + esc(r.date) + '</td>' +
            '<td class="whitespace-nowrap"><span class="period-tag ' + periodClass(r.period) + '">' + r.period + '</span></td>' +
            '<td class="whitespace-nowrap font-mono text-[11px]" style="color:#555">' + esc(r.time) + '</td>' +
            '<td style="color:#1a1a1a">' + esc(r.title) + '</td>' +
            '<td class="whitespace-nowrap font-medium" style="color:#0c5a80">' + esc(r.teacher) + '</td>' +
            '<td class="whitespace-nowrap text-[11px]" style="color:#555">' + esc(r.org) + '</td>' +
          '</tr>';
        }).join('');
      }

      document.getElementById('count').textContent = '共 ' + filtered.length + ' / ' + ROWS.length + ' 筆';
    }

    function resetFilters() {
      document.getElementById('f-search').value = '';
      document.getElementById('f-week').value = '';
      document.getElementById('f-period').value = '';
      document.getElementById('f-teacher').value = '';
      document.getElementById('f-breaks').checked = true;
      render();
    }

    initLiff();
  </script>
</body>
</html>
