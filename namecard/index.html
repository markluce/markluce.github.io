<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='4' fill='white'/><text x='32' y='44' font-family='serif' font-size='32' font-weight='bold' fill='black' text-anchor='middle'>陳</text></svg>" />
  <title>Mark 陳炳陵 — 馬克路思科技有限公司</title>
  <meta name="description" content="Mark 陳炳陵 · 馬克路思科技有限公司 · 統編 60670979" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100vh;
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
      background: #e5e5e5;
      color: #111;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .hint {
      color: #777;
      font-size: 0.72rem;
      margin-bottom: 20px;
      letter-spacing: 0.12em;
      user-select: none;
    }

    /* ========== Card ========== */
    .card-wrap {
      perspective: 1600px;
      width: min(92vw, 480px);
      aspect-ratio: 1.636 / 1;  /* 90mm x 55mm — Taiwan standard */
    }
    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.85s cubic-bezier(0.25, 1, 0.35, 1);
      cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      background: #fff;
      border: 1px solid #d4d4d4;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 16px -6px rgba(0,0,0,0.12),
        0 20px 40px -12px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* ======= FRONT ======= */
    .front {
      padding: 28px 32px;
      display: grid;
      grid-template-columns: auto 1px 1fr;
      gap: 24px;
      align-items: center;
    }

    /* Left: company mark (seal-style) */
    .seal {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 72px;
    }
    .seal-box {
      width: 64px;
      height: 64px;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif TC', serif;
      font-size: 2rem;
      font-weight: 900;
      color: #000;
      letter-spacing: -0.05em;
      line-height: 1;
    }
    .seal-en {
      margin-top: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.56rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #000;
      text-transform: uppercase;
    }

    /* Divider line */
    .divider {
      width: 1px;
      height: 80%;
      background: #000;
      align-self: center;
    }

    /* Right: identity */
    .identity {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      padding: 6px 0;
    }
    .company-zh {
      font-family: 'Noto Serif TC', serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: #000;
      letter-spacing: 0.05em;
    }
    .company-en {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      color: #444;
      letter-spacing: 0.08em;
      margin-top: 1px;
    }
    .name-block {
      margin: auto 0;
    }
    .name-zh {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.85rem;
      font-weight: 700;
      color: #000;
      letter-spacing: 0.15em;
      line-height: 1;
    }
    .name-en {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: #333;
      margin-top: 6px;
      letter-spacing: 0.04em;
    }
    .title-zh {
      font-family: 'Noto Serif TC', serif;
      font-size: 0.78rem;
      color: #000;
      letter-spacing: 0.08em;
      border-top: 1px solid #000;
      padding-top: 6px;
      display: inline-block;
      min-width: 60%;
    }

    /* ======= BACK ======= */
    .back {
      transform: rotateY(180deg);
      padding: 26px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 9px;
    }
    .back-header {
      font-family: 'Noto Serif TC', serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: #000;
      padding-bottom: 6px;
      margin-bottom: 4px;
      border-bottom: 1px solid #000;
      letter-spacing: 0.08em;
    }
    .row {
      display: flex;
      gap: 10px;
      font-size: 0.74rem;
      color: #111;
      line-height: 1.4;
      align-items: flex-start;
    }
    .row .k {
      flex-shrink: 0;
      width: 42px;
      color: #000;
      font-weight: 600;
      font-family: 'Noto Serif TC', serif;
      letter-spacing: 0.05em;
    }
    .row .v { min-width: 0; word-break: break-word; }
    .row a { color: #000; text-decoration: none; }
    .row a:hover { text-decoration: underline; }

    .tax {
      margin-top: 6px;
      padding-top: 8px;
      border-top: 1px solid #000;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.7rem;
      font-family: 'Inter', sans-serif;
      color: #000;
      letter-spacing: 0.06em;
    }
    .tax .tax-label {
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
    }
    .tax .tax-no {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* Responsive */
    @media (max-width: 420px) {
      .front { padding: 22px 22px; gap: 16px; }
      .back { padding: 22px 22px; }
      .seal-box { width: 56px; height: 56px; font-size: 1.7rem; }
      .name-zh { font-size: 1.55rem; letter-spacing: 0.1em; }
      .row { font-size: 0.68rem; }
      .row .k { width: 38px; }
    }

    /* ======= Actions ======= */
    .actions {
      margin-top: 28px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      appearance: none;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      padding: 9px 18px;
      font-size: 0.76rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s ease;
    }
    .btn:hover {
      background: #000;
      color: #fff;
    }
    .btn-primary {
      background: #000;
      color: #fff;
    }
    .btn-primary:hover {
      background: #fff;
      color: #000;
    }

    footer {
      padding-top: 40px;
      color: #888;
      font-size: 0.68rem;
      text-align: center;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #000; }
  </style>
</head>
<body>
  <div class="page">
    <div class="hint">點擊名片翻面 · TAP TO FLIP</div>

    <div class="card-wrap">
      <div class="card" id="card">
        <!-- Front -->
        <div class="face front">
          <div class="seal">
            <div class="seal-box">陳</div>
            <div class="seal-en">MARKLUCE</div>
          </div>
          <div class="divider"></div>
          <div class="identity">
            <div>
              <div class="company-zh">馬克路思科技有限公司</div>
              <div class="company-en">MARKLUCE TECH CO., LTD.</div>
            </div>
            <div class="name-block">
              <div class="name-zh">陳炳陵</div>
              <div class="name-en">Mark Chen</div>
            </div>
            <div class="title-zh">創辦人 · Founder</div>
          </div>
        </div>

        <!-- Back -->
        <div class="face back">
          <div class="back-header">聯絡資訊 · CONTACT</div>
          <div class="row">
            <div class="k">地　址</div>
            <div class="v">台中市中區大誠里台灣大道一段501號10樓之1</div>
          </div>
          <div class="row">
            <div class="k">電　郵</div>
            <div class="v"><a href="mailto:markluceai@gmail.com">markluceai@gmail.com</a></div>
          </div>
          <div class="row">
            <div class="k">網　站</div>
            <div class="v"><a href="https://markluce.ai" target="_blank">markluce.ai</a></div>
          </div>
          <div class="row">
            <div class="k">LINE</div>
            <div class="v">@markluce</div>
          </div>
          <div class="tax">
            <span class="tax-label">統一編號</span>
            <span class="tax-no">60670979</span>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="flip-btn">翻面 / Flip</button>
      <a class="btn" id="vcard-btn" download="mark-chen.vcf">下載 vCard</a>
      <button class="btn" id="share-btn">分享</button>
    </div>

    <footer>
      <a href="/">← markluce.ai</a>
    </footer>
  </div>

<script>
  var card = document.getElementById('card');
  card.addEventListener('click', function() { card.classList.toggle('flipped'); });
  document.getElementById('flip-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    card.classList.toggle('flipped');
  });

  // vCard
  var vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:Mark Chen 陳炳陵',
    'N:Chen;Mark;;;',
    'ORG:Markluce Tech Co., Ltd.;馬克路思科技有限公司',
    'TITLE:Founder 創辦人',
    'EMAIL;TYPE=INTERNET:markluceai@gmail.com',
    'URL:https://markluce.ai',
    'ADR;TYPE=WORK:;;台灣大道一段501號10樓之1;台中市中區;;;台灣',
    'NOTE:統一編號 60670979',
    'END:VCARD',
  ].join('\r\n');
  var blob = new Blob([vcard], { type: 'text/vcard' });
  document.getElementById('vcard-btn').href = URL.createObjectURL(blob);

  // Share
  document.getElementById('share-btn').addEventListener('click', async function() {
    var data = {
      title: '陳炳陵 Mark Chen — 馬克路思科技有限公司',
      text: '馬克路思科技有限公司 · 統編 60670979',
      url: 'https://markluce.ai/namecard/',
    };
    if (navigator.share) {
      try { await navigator.share(data); } catch (e) {}
    } else {
      try {
        await navigator.clipboard.writeText(data.url);
        var btn = document.getElementById('share-btn');
        var orig = btn.textContent;
        btn.textContent = '✓ 已複製連結';
        setTimeout(function() { btn.textContent = orig; }, 1500);
      } catch (e) {}
    }
  });
</script>
</body>
</html>
