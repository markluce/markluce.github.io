<html lang="zh-Hant">
<head>

    .md-prose p { margin-bottom: 0.5em; }
    .md-prose ul, .md-prose ol { margin-left: 1.25em; margin-bottom: 0.5em; }
    .md-prose ul { list-style: disc; }
    .md-prose ol { list-style: decimal; }
    .md-prose a { color: #38bdf8; text-decoration: underline; }
    .md-prose code { background: rgba(255,255,255,0.1); padding: 0.1em 0.3em; border-radius: 0.25em; font-size: 0.85em; }
    .md-prose blockquote { border-left: 3px solid rgba(255,255,255,0.2); padding-left: 0.75em; margin-left: 0; color: #94a3b8; }
    .md-prose h1, .md-prose h2, .md-prose h3 { font-weight: 600; margin-bottom: 0.25em; }

</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-sky-950 to-slate-900 text-white font-sans">

  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-sky-500/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 -left-40 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>

  <!-- Nav -->
  <nav class="relative z-10 max-w-6xl mx-auto px-4 md:px-6 py-4 md:py-6">
    <div class="flex items-center justify-between">
      <a href="/" class="text-lg md:text-xl font-bold tracking-tight">
        <span class="text-sky-400">mark</span>luce
      </a>
      <div class="flex items-center gap-2 md:gap-4">
        <a href="/" class="text-slate-400 hover:text-white transition text-xs md:text-sm">AI PM 同學牆</a>
        <a href="/dbtc.html" class="text-slate-400 hover:text-white transition text-xs md:text-sm hidden md:inline">DBTC</a>
        <a href="/blog.html" class="text-slate-400 hover:text-white transition text-xs md:text-sm">Blog</a>
        <button id="login-btn" onclick="handleLogin()" class="line-btn text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-semibold transition flex items-center gap-1.5">
          <svg class="w-4 h-4 md:w-5 md:h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
          LINE 登入
        </button>
        <div id="user-info" class="hidden flex items-center gap-2">
          <img id="user-avatar" class="w-7 h-7 md:w-8 md:h-8 rounded-full glow-ring" src="" alt="" />
          <span id="user-name" class="text-xs md:text-sm text-emerald-400 font-medium max-w-[80px] md:max-w-none truncate"></span>
          <button onclick="handleLogout()" class="text-slate-500 hover:text-red-400 transition text-sm px-1" title="登出">登出</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Back link -->
  <div class="relative z-10 max-w-4xl mx-auto px-4 md:px-6 pt-4">
    <a href="/" class="text-slate-400 hover:text-white transition text-sm">&larr; 回到同學牆</a>
  </div>

  <!-- Member Profile -->
  <header id="profile-section" class="relative z-10 max-w-4xl mx-auto px-4 md:px-6 pt-6 pb-8">
    <div id="profile-loading" class="text-center py-12 text-slate-500">
      <div class="inline-block w-6 h-6 border-2 border-slate-600 border-t-sky-400 rounded-full animate-spin mb-3"></div>
      <p class="text-sm">載入中...</p>
    </div>
    <div id="profile-content" class="hidden fade-in">
      <div class="bg-white/5 border border-white/10 rounded-2xl p-6 md:p-8 backdrop-blur-sm">
        <div class="flex items-center gap-5 mb-6">
          <img id="p-avatar" src="" alt="" class="w-24 h-24 rounded-full bg-slate-700 flex-shrink-0" />
          <div>
            <h1 id="p-name" class="text-2xl font-bold text-white"></h1>
            <p id="p-meta" class="text-slate-400 text-sm mt-1"></p>
            <span id="p-group" class="mt-2 inline-block"></span>
          </div>
        </div>
        <div id="p-intro" class="text-slate-300 text-sm leading-relaxed md-prose"></div>
      </div>
    </div>
    <div id="profile-not-found" class="hidden text-center py-16">
      <div class="text-5xl mb-4">🔍</div>
      <p class="text-slate-400 text-lg font-medium mb-2">找不到這位同學</p>
      <p class="text-slate-500 text-sm"><a href="/" class="text-sky-400 hover:underline">回到同學牆</a></p>
    </div>
  </header>

  <!-- Message Wall -->
  <section class="relative z-10 max-w-4xl mx-auto px-4 md:px-6 pb-8">
    <h2 id="wall-title" class="hidden text-lg font-bold text-white mb-4">💬 同學留言牆</h2>

    <!-- Message Form -->
    <div id="msg-form" class="hidden mb-6 fade-in">
      <div class="bg-white/5 border border-emerald-500/20 rounded-2xl p-5">
        <p class="text-slate-400 text-xs mb-2">留一則訊息給這位同學（每人限一則，可編輯）</p>
        <textarea id="f-content" rows="3" placeholder="寫點什麼吧..." class="w-full bg-white/5 border border-white/20 rounded-lg px-3 py-2 text-white text-sm placeholder-slate-600 focus:outline-none focus:border-emerald-500 resize-none"></textarea>
        <div class="flex items-center gap-3 mt-3">
          <button onclick="submitMsg()" class="line-btn text-white px-5 py-2 rounded-lg text-sm font-semibold transition">送出留言</button>
          <button id="delete-own-btn" onclick="deleteOwnMsg()" class="hidden px-4 py-2 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 hover:bg-red-500/20 text-sm transition">刪除我的留言</button>
          <span id="form-msg" class="text-xs hidden"></span>
        </div>
      </div>
    </div>

    <!-- Login prompt -->
    <div id="login-prompt" class="hidden mb-6 text-center">
      <p class="text-slate-500 text-sm">用 LINE 登入後即可留言給這位同學</p>
    </div>

    <!-- Messages list -->
    <div id="messages-list" class="space-y-4"></div>
    <div id="no-messages" class="hidden text-center py-8">
      <p class="text-slate-500 text-sm">還沒有人留言，成為第一個吧！</p>
    </div>
  </section>

  <!-- Avatar Modal -->
  <div id="avatar-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm" onclick="closeAvatar()">
    <div class="text-center" onclick="event.stopPropagation()">
      <img id="avatar-modal-img" src="" alt="" class="w-64 h-64 rounded-full mx-auto shadow-2xl shadow-sky-500/20 border-4 border-white/10" />
      <p id="avatar-modal-name" class="text-white font-bold text-lg mt-4"></p>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm" onclick="closeDeleteModal()">
    <div class="bg-slate-800 border border-white/10 rounded-2xl p-6 max-w-sm mx-4 shadow-2xl" onclick="event.stopPropagation()">
      <h3 class="text-white font-bold text-lg mb-2">確認刪除</h3>
      <p class="text-slate-400 text-sm mb-6">確定要刪除你的留言？此操作無法復原。</p>
      <div class="flex gap-3 justify-end">
        <button onclick="closeDeleteModal()" class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-slate-400 text-sm hover:bg-white/10 transition">取消</button>
        <button id="delete-confirm-btn" onclick="confirmDeleteOwn()" class="px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg text-white text-sm font-medium transition">刪除</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="relative z-10 max-w-6xl mx-auto px-6 py-12 text-center border-t border-white/10">
    <div class="mb-4">
      <span class="text-sky-400 font-bold">mark</span><span class="text-white font-bold">luce</span>
      <span class="text-slate-500 text-sm ml-2">馬克路思科技有限公司</span>
    </div>
    <p class="text-slate-600 text-xs mt-4">
      <a href="/" class="text-sky-400/60 hover:text-sky-400">同學牆</a> &middot;
      <a href="/dbtc.html" class="text-sky-400/60 hover:text-sky-400">DBTC</a> &middot;
      <a href="/blog.html" class="text-sky-400/60 hover:text-sky-400">Blog</a> &middot;
      <a href="/about.html" class="text-sky-400/60 hover:text-sky-400">關於</a>
    </p>
  </footer>

  <script>
    var SUPABASE_URL = 'https://dcjlekszmobaenhrdbfl.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_LoGKEHFftjjIf0G1Xv3ozA_A5nZeudW';
    var LIFF_ID = '2009738746-2qigSpHh';
    var ADMIN_LINE_ID = 'U7d41d4b9a49052370bd3a7265c1e391b';

    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var currentUser = null;
    var pageId = new URLSearchParams(window.location.search).get('id');
    var myMessage = null; // existing message from current user to this member

    if (!pageId) {
      window.location.href = '/';
    }

    function renderMd(str) {
      if (!str) return '';
      return DOMPurify.sanitize(marked.parse(str));
    }

    function escHtml(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    async function initLiff() {
      if (!LIFF_ID || typeof liff === 'undefined') return;
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          var profile = await liff.getProfile();
          currentUser = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl || '' };
          showLoggedIn();
        } else {
          // Show login prompt if not on own page
          document.getElementById('login-prompt').classList.remove('hidden');
        }
      } catch (e) {
        console.error('LIFF init error:', e);
        document.getElementById('login-prompt').classList.remove('hidden');
      }
    }

    function handleLogin() {
      if (!LIFF_ID || typeof liff === 'undefined') return;
      var base = window.location.origin + window.location.pathname;
      liff.login({ redirectUri: base + '?id=' + encodeURIComponent(pageId) + '&v=' + Date.now() });
    }

    function handleLogout() {
      if (typeof liff !== 'undefined' && liff.isLoggedIn()) liff.logout();
      window.location.reload();
    }

    async function showLoggedIn() {
      document.getElementById('login-btn').style.display = 'none';
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('user-avatar').src = currentUser.pictureUrl;
      document.getElementById('user-name').textContent = currentUser.displayName;
      document.getElementById('login-prompt').classList.add('hidden');

      // Don't show message form on own page
      if (currentUser.userId === pageId) return;

      // Check for existing message
      var result = await sb.from('member_messages')
        .select('*')
        .eq('from_member_id', currentUser.userId)
        .eq('to_member_id', pageId)
        .maybeSingle();

      myMessage = result.data;
      if (myMessage) {
        document.getElementById('f-content').value = myMessage.content || '';
        document.getElementById('delete-own-btn').classList.remove('hidden');
      }
      document.getElementById('msg-form').classList.remove('hidden');
    }

    async function loadProfile() {
      var result = await sb.from('classmates').select('*').eq('line_user_id', pageId).maybeSingle();
      document.getElementById('profile-loading').classList.add('hidden');

      if (!result.data) {
        document.getElementById('profile-not-found').classList.remove('hidden');
        return;
      }

      var c = result.data;
      document.title = escHtml(c.display_name) + ' — 同學留言牆';
      document.getElementById('p-avatar').src = c.avatar_url || '';
      document.getElementById('p-name').textContent = c.display_name;

      var meta = [];
      if (c.company) meta.push(c.company);
      if (c.job_title) meta.push(c.job_title);
      document.getElementById('p-meta').textContent = meta.join(' · ');

      var groupEl = document.getElementById('p-group');
      if (c.group_number == 0) {
        groupEl.className = 'mt-2 inline-block px-2 py-0.5 bg-amber-500/10 border border-amber-500/20 rounded-full text-amber-400 text-xs';
        groupEl.textContent = '講師 / 助教';
      } else if (c.group_number == 99) {
        groupEl.className = 'mt-2 inline-block px-2 py-0.5 bg-slate-500/10 border border-slate-500/20 rounded-full text-slate-400 text-xs';
        groupEl.textContent = '測試帳號';
      } else if (c.group_number) {
        groupEl.className = 'mt-2 inline-block px-2 py-0.5 bg-sky-500/10 border border-sky-500/20 rounded-full text-sky-400 text-xs';
        groupEl.textContent = '第 ' + c.group_number + ' 組';
      }

      if (c.intro_text) {
        document.getElementById('p-intro').innerHTML = renderMd(c.intro_text);
      } else {
        document.getElementById('p-intro').innerHTML = '<p class="text-slate-600 italic">尚未填寫自我介紹</p>';
      }

      document.getElementById('profile-content').classList.remove('hidden');
      document.getElementById('wall-title').classList.remove('hidden');
    }

    async function loadMessages() {
      var result = await sb.from('member_messages')
        .select('*')
        .eq('to_member_id', pageId)
        .order('created_at', { ascending: false });

      var list = document.getElementById('messages-list');

      if (!result.data || result.data.length === 0) {
        document.getElementById('no-messages').classList.remove('hidden');
        list.innerHTML = '';
        return;
      }

      document.getElementById('no-messages').classList.add('hidden');
      list.innerHTML = result.data.map(function(m, i) {
        var timeStr = new Date(m.updated_at || m.created_at).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
        var isOwn = currentUser && m.from_member_id === currentUser.userId;
        return '<div class="fade-in bg-white/5 border border-white/10 rounded-xl p-4 backdrop-blur-sm' + (isOwn ? ' ring-1 ring-emerald-500/30' : '') + '" style="animation-delay:' + (i * 60) + 'ms">' +
          '<div class="flex items-center gap-3 mb-2">' +
            (m.from_avatar_url ? '<img src="' + escHtml(m.from_avatar_url) + '" alt="" class="w-10 h-10 rounded-full bg-slate-700 flex-shrink-0" onerror="this.style.display=\'none\'" />' : '<div class="w-10 h-10 rounded-full bg-gradient-to-br from-sky-500 to-cyan-500 flex items-center justify-center text-sm font-bold flex-shrink-0">' + escHtml((m.from_display_name || '?').charAt(0)) + '</div>') +
            '<div class="flex-1 min-w-0">' +
              '<span class="font-medium text-white text-sm">' + escHtml(m.from_display_name) + '</span>' +
              (isOwn ? '<span class="ml-2 text-emerald-400 text-xs">你的留言</span>' : '') +
              '<div class="text-slate-500 text-xs">' + timeStr + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="text-slate-300 text-sm leading-relaxed md-prose">' + renderMd(m.content) + '</div>' +
        '</div>';
      }).join('');
    }

    async function submitMsg() {
      if (!currentUser || currentUser.userId === pageId) return;
      var content = document.getElementById('f-content').value.trim();
      if (!content) return;

      var msg = document.getElementById('form-msg');
      var record = {
        from_member_id: currentUser.userId,
        to_member_id: pageId,
        from_display_name: currentUser.displayName,
        from_avatar_url: currentUser.pictureUrl,
        content: content,
        updated_at: new Date().toISOString(),
      };

      var result;
      if (myMessage) {
        result = await sb.from('member_messages')
          .update({ content: content, from_display_name: currentUser.displayName, from_avatar_url: currentUser.pictureUrl, updated_at: new Date().toISOString() })
          .eq('from_member_id', currentUser.userId)
          .eq('to_member_id', pageId);
      } else {
        result = await sb.from('member_messages').insert(record);
      }

      if (result.error) {
        msg.textContent = '送出失敗：' + result.error.message;
        msg.className = 'text-xs text-red-400';
      } else {
        msg.textContent = myMessage ? '已更新留言！' : '留言已送出！';
        msg.className = 'text-xs text-emerald-400';
        myMessage = record;
        document.getElementById('delete-own-btn').classList.remove('hidden');
        loadMessages();
      }
      msg.classList.remove('hidden');
      setTimeout(function() { msg.classList.add('hidden'); }, 3000);
    }

    function deleteOwnMsg() {
      var modal = document.getElementById('delete-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeDeleteModal() {
      var modal = document.getElementById('delete-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    async function confirmDeleteOwn() {
      if (!currentUser || !myMessage) return;
      var btn = document.getElementById('delete-confirm-btn');
      btn.textContent = '刪除中...';
      btn.disabled = true;

      var result = await sb.from('member_messages')
        .delete()
        .eq('from_member_id', currentUser.userId)
        .eq('to_member_id', pageId);

      if (result.error) {
        btn.textContent = '失敗';
        setTimeout(function() { btn.textContent = '刪除'; btn.disabled = false; }, 2000);
      } else {
        myMessage = null;
        document.getElementById('f-content').value = '';
        document.getElementById('delete-own-btn').classList.add('hidden');
        closeDeleteModal();
        btn.textContent = '刪除';
        btn.disabled = false;
        loadMessages();
      }
    }

    function showAvatar(url, name) {
      document.getElementById('avatar-modal-img').src = url;
      document.getElementById('avatar-modal-name').textContent = name;
      var modal = document.getElementById('avatar-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }
    function closeAvatar() {
      var modal = document.getElementById('avatar-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Visit tracking
    (function() {
      fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(d) {
        sb.from('visits').insert({ page: location.pathname + location.search, ip: d.ip, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      }).catch(function() {
        sb.from('visits').insert({ page: location.pathname + location.search, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      });
    })();

    initLiff();
    loadProfile();
    loadMessages();
  </script>

</body>
</html>
