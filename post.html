  <!-- Post content -->
  <main class="relative z-10 max-w-3xl mx-auto px-6 pb-16">
    <div id="loading" class="text-center py-24 text-slate-500">
      <div class="inline-block w-6 h-6 border-2 border-slate-600 border-t-sky-400 rounded-full animate-spin mb-3"></div>
      <p class="text-sm">載入文章中...</p>
    </div>

    <div id="not-found" class="hidden text-center py-24">
      <p class="text-slate-400 text-xl font-bold mb-2">找不到這篇文章</p>
      <a href="/blog.html" class="text-sky-400 hover:underline text-sm">返回 Blog</a>
    </div>

    <article id="post" class="hidden">
      <!-- Back link -->
      <div class="mb-8">
        <a href="/blog.html" class="text-slate-500 hover:text-sky-400 transition text-sm flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          返回 Blog

      </div>

      <!-- Header -->
      <header class="mb-8">
        <h1 id="post-title" class="text-3xl md:text-4xl font-extrabold leading-tight mb-4"></h1>
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-sky-500 to-cyan-500 flex items-center justify-center text-sm font-bold">ML</div>
          <div>
            <div class="text-white font-medium text-sm">Mark 陳炳陵</div>
            <div class="text-slate-500 text-xs"><span id="post-date"></span></div>
          </div>
          <a id="post-fb-link" href="#" target="_blank" rel="noopener noreferrer" class="hidden ml-auto text-slate-600 hover:text-sky-400 transition text-xs flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.77 7.46H14.5v-1.9c0-.9.6-1.1 1-1.1h3V.5h-4.33C10.24.5 9.5 3.44 9.5 5.32v2.15h-3v4h3v12h5v-12h3.85l.42-4z"/></svg>
            原始 FB 貼文
          </a>
        </div>
      </header>

      <!-- Content -->
      <div id="post-content" class="text-slate-300 text-base leading-relaxed mb-8"></div>

      <!-- Images -->
      <div id="post-images" class="space-y-4 mb-8"></div>

      <!-- Divider -->
      <div id="comments-divider" class="hidden border-t border-white/10 pt-8 mb-6">
        <h2 class="text-lg font-bold text-slate-400 mb-4" id="comments-heading"></h2>
      </div>

      <!-- Comments -->
      <div id="post-comments" class="space-y-4 mb-8"></div>
    </article>
  </main>

  <!-- Footer -->
  <footer class="relative z-10 max-w-6xl mx-auto px-6 py-12 text-center border-t border-white/10">
    <div class="mb-4">
      <span class="text-sky-400 font-bold">mark</span><span class="text-white font-bold">luce</span>
      <span class="text-slate-500 text-sm ml-2">馬克路思科技有限公司</span>
    </div>
    <p class="text-slate-600 text-xs mt-4">
      <a href="/" class="text-sky-400/60 hover:text-sky-400">同學牆</a> &middot;
      <a href="/blog.html" class="text-sky-400/60 hover:text-sky-400">Blog</a> &middot;
      <a href="/about.html" class="text-sky-400/60 hover:text-sky-400">關於</a> &middot;
      <a href="https://github.com/markluce" class="text-sky-400/60 hover:text-sky-400">GitHub</a>
    </p>
  </footer>

  <script>
    var sb = supabase.createClient('https://dcjlekszmobaenhrdbfl.supabase.co', 'sb_publishable_LoGKEHFftjjIf0G1Xv3ozA_A5nZeudW');

    async function loadPost() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');

      if (!slug) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('not-found').classList.remove('hidden');
        return;
      }

      var result = await sb
        .from('blog_posts')
        .select('*')
        .eq('slug', slug)
        .eq('is_public', true)
        .maybeSingle();

      document.getElementById('loading').classList.add('hidden');

      if (result.error || !result.data) {
        document.getElementById('not-found').classList.remove('hidden');
        return;
      }

      var p = result.data;

      // Update page title and meta
      document.title = (p.title || 'Blog') + ' — Mark 陳炳陵';
      var meta = document.querySelector('meta[name="description"]');
      if (meta) meta.content = (p.content || '').substring(0, 160);

      // Header
      document.getElementById('post-title').textContent = p.title || '';
      var d = new Date(p.posted_date + 'T00:00:00');
      document.getElementById('post-date').textContent = d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');

      // FB link
      if (p.fb_url) {
        var fbLink = document.getElementById('post-fb-link');
        fbLink.href = p.fb_url;
        fbLink.classList.remove('hidden');
      }

      // Content — parse basic markdown
      var contentHtml = parseMarkdown(p.content || '');
      document.getElementById('post-content').innerHTML = contentHtml;

      // Images
      var images = p.images || [];
      if (images.length > 0) {
        var imgsHtml = images.map(function(img) {
          var url = typeof img === 'string' ? img : img.url;
          var alt = typeof img === 'string' ? '' : (img.alt || '');
          return '<img src="' + escHtml(url) + '" alt="' + escHtml(alt) + '" class="rounded-xl w-full max-w-lg mx-auto" loading="lazy" />';
        }).join('');
        document.getElementById('post-images').innerHTML = imgsHtml;
      }

      // Comments
      var comments = p.comments || [];
      if (comments.length > 0) {
        document.getElementById('comments-divider').classList.remove('hidden');
        document.getElementById('comments-heading').textContent = comments.length + ' 則留言';
        var commentsHtml = comments.map(function(c) {
          return '<div class="bg-white/5 border border-white/10 rounded-xl p-4">' +
            '<div class="flex items-center gap-2 mb-2">' +
              '<div class="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold">' + escHtml((c.name || '?').charAt(0)) + '</div>' +
              '<span class="text-white text-sm font-medium">' + escHtml(c.name || 'Anonymous') + '</span>' +
              (c.date ? '<span class="text-slate-600 text-xs ml-auto">' + escHtml(c.date) + '</span>' : '') +
            '</div>' +
            '<p class="text-slate-400 text-sm leading-relaxed">' + escHtml(c.text || '').replace(/\n/g, '<br/>') + '</p>' +
          '</div>';
        }).join('');
        document.getElementById('post-comments').innerHTML = commentsHtml;
      }

      // Show post
      document.getElementById('post').classList.remove('hidden');
    }

    function escHtml(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function parseMarkdown(text) {
      var html = escHtml(text);
      // Horizontal rules (--- or more)
      html = html.replace(/^-{3,}$/gm, '<hr class="border-white/10 my-4"/>');
      // Bold **text** or __text__
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong class="text-white">$1</strong>');
      html = html.replace(/__(.+?)__/g, '<strong class="text-white">$1</strong>');
      // Italic *text*
      html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
      // Links https://...
      html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" class="text-sky-400 hover:underline break-all">$1</a>');
      // Headers # ## ###
      html = html.replace(/^### (.+)$/gm, '<h3 class="text-white font-bold text-base mt-4 mb-1">$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2 class="text-white font-bold text-lg mt-6 mb-2">$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1 class="text-white font-extrabold text-xl mt-6 mb-2">$1</h1>');
      // Blockquote > text
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote class="border-l-4 border-sky-500/30 pl-4 text-slate-400 italic my-2">$1</blockquote>');
      // Bullet lists - item
      html = html.replace(/^[-•] (.+)$/gm, '<li class="ml-4 list-disc text-slate-300">$1</li>');
      // Numbered lists 1. item
      html = html.replace(/^\d+\. (.+)$/gm, '<li class="ml-4 list-decimal text-slate-300">$1</li>');
      // Paragraphs: double newline = new paragraph, single newline = <br>
      html = html.replace(/\n\n/g, '</p><p class="mb-3">');
      html = html.replace(/\n/g, '<br/>');
      html = '<p class="mb-3">' + html + '</p>';
      return html;
    }

    // Visit tracking
    (function() {
      fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(d) {
        sb.from('visits').insert({ page: location.pathname + location.search, ip: d.ip, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      }).catch(function() {
        sb.from('visits').insert({ page: location.pathname + location.search, user_agent: navigator.userAgent, referrer: document.referrer || null, screen_width: screen.width, screen_height: screen.height, language: navigator.language });
      });
    })();

    loadPost();
  </script>
