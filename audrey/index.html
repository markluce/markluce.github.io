<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23f59e0b'/><text x='32' y='44' font-family='Arial,sans-serif' font-size='32' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>" />
  <title>Audrey — AI 英文小腳本</title>
  <meta name="description" content="Audrey — 輸入孩子的興趣，AI 生成 1 分鐘英文短腳本，把 3C 時間變成主動英語練習" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #fff7ed 0%, #fef3c7 50%, #fde68a 100%); min-height: 100vh; }
    .script-box { font-family: 'Inter', sans-serif; line-height: 1.8; font-size: 1.1rem; }
    .script-box .zh { color: #78350f; font-family: 'Noto Sans TC', sans-serif; font-size: 0.95rem; }
    .pulse-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .line-btn { background: #06C755; }
    .line-btn:hover { background: #05b64d; }
    .audio-player { display: flex; align-items: center; gap: 10px; margin: 12px 0 0; padding: 8px 12px; background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.30); border-radius: 12px; width: 100%; box-sizing: border-box; }
    .audio-player .pp-btn { background: linear-gradient(135deg,#f59e0b,#ef4444); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; }
    .audio-player .pp-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .audio-player .seek { flex: 1 1 auto; min-width: 50px; -webkit-appearance: none; appearance: none; height: 6px; background: rgba(120,53,15,0.20); border-radius: 3px; outline: none; cursor: pointer; padding: 0; margin: 0; }
    .audio-player .seek::-webkit-slider-runnable-track { height: 6px; background: rgba(120,53,15,0.20); border-radius: 3px; }
    .audio-player .seek::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; background: #f59e0b; border-radius: 50%; cursor: pointer; margin-top: -4px; border: 2px solid #fff7ed; }
    .audio-player .seek::-moz-range-track { height: 6px; background: rgba(120,53,15,0.20); border-radius: 3px; border: none; }
    .audio-player .seek::-moz-range-thumb { width: 14px; height: 14px; background: #f59e0b; border-radius: 50%; cursor: pointer; border: 2px solid #fff7ed; }
    .audio-player .time { font-size: 0.72rem; color: #78350f; font-variant-numeric: tabular-nums; min-width: 34px; white-space: nowrap; flex-shrink: 0; }
  </style>
</head>
<body class="text-slate-800">
  <div class="max-w-2xl mx-auto px-4 py-8">
    <header class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-500 text-white text-3xl font-black mb-3">A</div>
      <h1 class="text-3xl md:text-4xl font-black text-amber-900">Audrey</h1>
      <p class="text-amber-800 mt-1">AI 孩子英文學習小腳本</p>
      <p class="text-sm text-slate-600 mt-2">輸入興趣關鍵字 → 產生 1 分鐘英文短腳本 → 讀給孩子聽，或讓孩子讀出來</p>
    </header>

    <!-- Login gate -->
    <section id="gate" class="bg-white/80 backdrop-blur rounded-2xl shadow-lg p-8 text-center">
      <p class="text-slate-700 mb-4">請先使用 LINE 登入</p>
      <button id="login-btn" class="line-btn text-white font-bold px-6 py-3 rounded-xl shadow-md inline-flex items-center gap-2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.89c.50 0 .91.41.91.91s-.41.91-.91.91h-2.5v1.59h2.5c.5 0 .91.41.91.91s-.41.91-.91.91h-3.41a.91.91 0 0 1-.91-.91V8.53c0-.5.41-.91.91-.91h3.41c.5 0 .91.41.91.91s-.41.91-.91.91h-2.5v1.59h2.5zM13.19 14.06a.91.91 0 0 1-.91.91.9.9 0 0 1-.73-.37l-3.5-4.77v4.23c0 .5-.41.91-.91.91s-.91-.41-.91-.91V8.53c0-.39.25-.74.62-.87.09-.03.19-.04.29-.04.29 0 .55.13.72.37l3.53 4.78V8.53c0-.5.41-.91.91-.91s.91.41.91.91v5.53zM5.91 14.97a.91.91 0 0 1-.91-.91V8.53c0-.5.41-.91.91-.91s.91.41.91.91v5.53c0 .5-.41.91-.91.91M12 2C5.93 2 1 5.95 1 10.8c0 4.35 3.91 8 9.19 8.67.36.08.84.24.97.55.11.28.07.72.03 1l-.15 1c-.05.28-.24 1.07.94.58 1.18-.49 6.34-3.73 8.65-6.39h.01C21.92 14.44 23 12.76 23 10.8 23 5.95 18.07 2 12 2"/></svg>
        使用 LINE 登入
      </button>
      <p class="text-xs text-slate-500 mt-4">登入後即可使用 Audrey 生成英文小腳本</p>
    </section>

    <!-- User bar + main app -->
    <section id="app" class="hidden">
      <div class="flex items-center justify-between bg-white/70 rounded-xl px-4 py-2 mb-4">
        <div class="flex items-center gap-2">
          <img id="user-avatar" class="w-8 h-8 rounded-full" alt="" />
          <span id="user-name" class="text-sm font-semibold text-slate-700"></span>
        </div>
        <button id="logout-btn" class="text-xs text-slate-500 hover:text-slate-700">登出</button>
      </div>

      <div class="bg-white/80 backdrop-blur rounded-2xl shadow-lg p-6 mb-6">
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">孩子年齡</label>
            <input id="age" type="number" min="3" max="15" value="6" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">程度</label>
            <select id="level" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none">
              <option value="beginner">入門 (A1)</option>
              <option value="elementary" selected>基礎 (A2)</option>
              <option value="intermediate">中級 (B1)</option>
            </select>
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 mb-1">興趣關鍵字</label>
          <input id="interest" type="text" placeholder="例如：恐龍、冰淇淋、太空船、忍者" value="恐龍" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none" />
          <div class="mt-2 flex flex-wrap gap-1.5">
            <button type="button" class="chip text-xs px-2.5 py-1 rounded-full bg-amber-100 text-amber-800 hover:bg-amber-200">恐龍</button>
            <button type="button" class="chip text-xs px-2.5 py-1 rounded-full bg-amber-100 text-amber-800 hover:bg-amber-200">冰淇淋</button>
            <button type="button" class="chip text-xs px-2.5 py-1 rounded-full bg-amber-100 text-amber-800 hover:bg-amber-200">太空船</button>
            <button type="button" class="chip text-xs px-2.5 py-1 rounded-full bg-amber-100 text-amber-800 hover:bg-amber-200">忍者</button>
            <button type="button" class="chip text-xs px-2.5 py-1 rounded-full bg-amber-100 text-amber-800 hover:bg-amber-200">小貓</button>
            <button type="button" class="chip text-xs px-2.5 py-1 rounded-full bg-amber-100 text-amber-800 hover:bg-amber-200">樂高</button>
          </div>
        </div>
        <button id="gen" class="pulse-btn w-full py-3 rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-bold shadow-md transition">
          產生 1 分鐘小腳本 ✨
        </button>
        <p class="text-xs text-slate-500 mt-2 text-center">約 80–120 字，適合 1 分鐘朗讀</p>
      </div>

      <div id="output" class="hidden bg-white rounded-2xl shadow-lg p-6 fade-in">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-bold text-amber-900">今日小腳本</h2>
          <div class="flex gap-2">
            <button id="speak" class="text-xs px-3 py-1.5 rounded-lg bg-emerald-100 text-emerald-800 hover:bg-emerald-200 font-semibold">🔊 朗讀</button>
            <button id="copy" class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200 font-semibold">📋 複製</button>
          </div>
        </div>
        <div id="script" class="script-box"></div>
        <div id="player-slot"></div>
      </div>
    </section>

    <footer class="text-center text-xs text-slate-500 mt-8">
      <p>把「看螢幕」的時間轉為「讀/說腳本」的主動練習</p>
      <p class="mt-1">Prototype · <a href="/" class="text-amber-700 hover:underline">markluce.ai</a></p>
    </footer>
  </div>

<script>
// ----- Config -----
var SUPABASE_URL = 'https://dcjlekszmobaenhrdbfl.supabase.co';
var SUPABASE_KEY = 'sb_publishable_LoGKEHFftjjIf0G1Xv3ozA_A5nZeudW';
var FN_URL = SUPABASE_URL + '/functions/v1/audrey-chat';
var TTS_URL = SUPABASE_URL + '/functions/v1/tts';
// Reusing arita LIFF ID for prototype. Replace with dedicated Audrey LIFF ID for production.
var LIFF_ID = '2009738746-2qigSpHh';

var currentUser = null;

// ----- LIFF login -----
async function initLiff() {
  if (typeof liff === 'undefined') {
    console.error('LIFF SDK not loaded');
    return;
  }
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      var profile = await liff.getProfile();
      currentUser = {
        userId: profile.userId,
        displayName: profile.displayName,
        pictureUrl: profile.pictureUrl || '',
      };
      showApp();
    }
  } catch (e) {
    console.error('LIFF init error:', e);
  }
}

function showApp() {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('user-avatar').src = currentUser.pictureUrl;
  document.getElementById('user-name').textContent = currentUser.displayName;
}

document.getElementById('login-btn').addEventListener('click', function() {
  if (typeof liff === 'undefined') return;
  var base = window.location.origin + window.location.pathname;
  liff.login({ redirectUri: base + '?v=' + Date.now() });
});

document.getElementById('logout-btn').addEventListener('click', function() {
  if (typeof liff !== 'undefined' && liff.isLoggedIn()) liff.logout();
  window.location.reload();
});

initLiff();

// ----- App -----
var $ = function(id) { return document.getElementById(id); };
var btn = $('gen');
var out = $('output');
var scriptEl = $('script');

document.querySelectorAll('.chip').forEach(function(c) {
  c.addEventListener('click', function() { $('interest').value = c.textContent; });
});

btn.addEventListener('click', async function() {
  if (!currentUser) { alert('請先登入'); return; }
  var age = parseInt($('age').value, 10) || 6;
  var level = $('level').value;
  var interest = $('interest').value.trim();
  if (!interest) { alert('請輸入興趣關鍵字'); return; }

  btn.disabled = true;
  btn.textContent = '生成中... ⏳';
  scriptEl.innerHTML = '';
  out.classList.remove('hidden');

  try {
    var res = await fetch(FN_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
      body: JSON.stringify({
        age: age,
        level: level,
        interest: interest,
        line_user_id: currentUser.userId,
        display_name: currentUser.displayName,
      }),
    });
    if (!res.ok) {
      var errText = await res.text();
      throw new Error('HTTP ' + res.status + ' ' + errText);
    }
    var data = await res.json();
    renderScript(data);
  } catch (err) {
    scriptEl.innerHTML = '<p class="text-red-600">生成失敗：' + escapeHtml(err.message) + '</p>';
  } finally {
    btn.disabled = false;
    btn.textContent = '產生 1 分鐘小腳本 ✨';
  }
});

function renderScript(data) {
  var linesHtml = (data.lines || []).map(function(l) {
    return '<p><span class="en">' + escapeHtml(l.en) + '</span><br><span class="zh">' + escapeHtml(l.zh || '') + '</span></p>';
  }).join('');
  var title = data.title ? '<h3 class="font-bold text-lg text-amber-900 mb-2">' + escapeHtml(data.title) + '</h3>' : '';
  var vocab = '';
  if (data.vocab && data.vocab.length) {
    vocab = '<div class="mt-4 pt-4 border-t border-slate-200"><p class="text-xs font-bold text-slate-600 mb-1">關鍵字 Key Words</p><div class="flex flex-wrap gap-1.5">' +
      data.vocab.map(function(v) { return '<span class="text-xs px-2 py-0.5 rounded bg-amber-50 text-amber-800">' + escapeHtml(v) + '</span>'; }).join('') +
      '</div></div>';
  }
  scriptEl.innerHTML = title + linesHtml + vocab;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

var currentAudio = null;

function fmtTime(s) {
  if (!s || !isFinite(s)) return '--:--';
  var m = Math.floor(s / 60);
  return m + ':' + (Math.floor(s % 60) + '').padStart(2, '0');
}

function buildPlayer(audio) {
  var player = document.createElement('div');
  player.className = 'audio-player';
  player.innerHTML =
    '<button class="pp-btn" title="播放/暫停">▶</button>' +
    '<span class="time cur">0:00</span>' +
    '<input type="range" min="0" max="1000" value="0" step="1" class="seek">' +
    '<span class="time dur">--:--</span>';

  var ppBtn = player.querySelector('.pp-btn');
  var seekBar = player.querySelector('.seek');
  var curTime = player.querySelector('.cur');
  var durTime = player.querySelector('.dur');

  function updateDuration() {
    if (audio.duration && isFinite(audio.duration)) durTime.textContent = fmtTime(audio.duration);
  }
  audio.addEventListener('loadedmetadata', updateDuration);
  audio.addEventListener('durationchange', updateDuration);
  audio.addEventListener('canplay', updateDuration);
  audio.addEventListener('timeupdate', function() {
    if (!seekBar._dragging && audio.duration && isFinite(audio.duration))
      seekBar.value = Math.floor(audio.currentTime / audio.duration * 1000);
    curTime.textContent = fmtTime(audio.currentTime);
    updateDuration();
  });
  audio.addEventListener('play', function() { ppBtn.innerHTML = '⏸'; });
  audio.addEventListener('pause', function() { ppBtn.innerHTML = '▶'; });
  audio.addEventListener('ended', function() {
    ppBtn.innerHTML = '▶'; seekBar.value = 0; curTime.textContent = '0:00';
  });

  ppBtn.onclick = function() { audio.paused ? audio.play() : audio.pause(); };
  seekBar.addEventListener('mousedown', function() { seekBar._dragging = true; });
  seekBar.addEventListener('mouseup', function() { seekBar._dragging = false; });
  seekBar.addEventListener('touchstart', function() { seekBar._dragging = true; });
  seekBar.addEventListener('touchend', function() { seekBar._dragging = false; });
  seekBar.addEventListener('input', function() {
    if (audio.duration && isFinite(audio.duration))
      audio.currentTime = (seekBar.value / 1000) * audio.duration;
  });
  return player;
}

$('speak').addEventListener('click', async function() {
  var text = Array.prototype.slice.call(scriptEl.querySelectorAll('.en'))
    .map(function(e) { return e.textContent; }).join(' ');
  if (!text) return;

  // If player already exists, don't refetch — toggle play/pause
  if (currentAudio) {
    currentAudio.paused ? currentAudio.play() : currentAudio.pause();
    return;
  }

  var speakBtn = $('speak');
  speakBtn.disabled = true;
  speakBtn.textContent = '⏳ 載入中';
  try {
    var res = await fetch(TTS_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
      body: JSON.stringify({ text: text, voice: 'female' }),
    });
    if (!res.ok) throw new Error('TTS HTTP ' + res.status);
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.preload = 'auto';

    // Workaround: Azure TTS MP3 blobs lack duration metadata → audio.duration = Infinity.
    // Seeking to max then back to 0 forces Chrome to compute real duration.
    currentAudio.addEventListener('loadedmetadata', function onMeta() {
      if (currentAudio.duration === Infinity || isNaN(currentAudio.duration)) {
        currentAudio.currentTime = Number.MAX_SAFE_INTEGER;
        currentAudio.addEventListener('timeupdate', function onSeeked() {
          currentAudio.removeEventListener('timeupdate', onSeeked);
          currentAudio.currentTime = 0;
        });
      }
    }, { once: true });

    var player = buildPlayer(currentAudio);
    var slot = $('player-slot');
    slot.innerHTML = '';
    slot.appendChild(player);

    speakBtn.textContent = '🔊 朗讀';
    await currentAudio.play();
  } catch (err) {
    console.error('TTS error:', err);
    speakBtn.textContent = '❌ 朗讀失敗';
    setTimeout(function() { speakBtn.textContent = '🔊 朗讀'; }, 2000);
    currentAudio = null;
  } finally {
    speakBtn.disabled = false;
  }
});

// Reset audio + player when a new script is generated
var origRender = renderScript;
renderScript = function(data) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  var slot = $('player-slot');
  if (slot) slot.innerHTML = '';
  $('speak').textContent = '🔊 朗讀';
  origRender(data);
};

$('copy').addEventListener('click', async function() {
  var text = Array.prototype.slice.call(scriptEl.querySelectorAll('.en'))
    .map(function(e) { return e.textContent; }).join('\n');
  await navigator.clipboard.writeText(text);
  $('copy').textContent = '✓ 已複製';
  setTimeout(function() { $('copy').textContent = '📋 複製'; }, 1500);
});
</script>
</body>
</html>
